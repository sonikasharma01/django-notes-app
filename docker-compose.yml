services:
  web:
    build:
      context: .
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=notesdb
      - DB_USER=root
      - DB_PASSWORD=yourpassword
      - DB_HOST=mysql
      - DB_PORT=3306
    depends_on:
      - mysql

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: yourpassword
      MYSQL_DATABASE: notesdb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
